<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Q-Ez - A cross-platform quiz application for teachers and students.">
  <meta name="theme-color" content="#1565C0">

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Q-Ez Quiz App">
  <meta property="og:description" content="Create and take quizzes with Q-Ez. A platform for teachers and students.">

  <!-- iOS PWA meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Q-Ez">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Q-Ez Quiz App</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase JS SDK initialization -->
  <!-- 
    Firebase is initialized via Flutter's firebase_core package using firebase_options.dart.
    The firebase-config.js file provides the configuration reference for direct JS usage.
    For production, replace placeholder values in firebase-config.js or use environment
    variables injected at build time.
  -->
  <script src="firebase-config.js" defer></script>
</head>
<body>
  <!-- Flutter service worker registration hint for PWA caching -->
  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = null;
  </script>

  <!-- Flutter bootstrap - handles service worker registration automatically -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
